<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boat Operations — PHP + ChartJS Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #eef2f7;
            margin: 0;
            color: #333;
        }
        header {
            background: #1e3a5f;
            color: #fff;
            padding: 18px 30px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }
        header h1 { margin: 0; font-size: 22px; }
        header p  { margin: 4px 0 0; font-size: 13px; opacity: 0.85; }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 24px auto 40px;
            padding: 0 20px;
        }
        @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }

        .chart-box {
            background: #fff;
            padding: 18px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
            min-height: 340px;
        }
        .chart-title {
            font-size: 15px;
            font-weight: 600;
            margin: 0 0 12px;
            color: #1e3a5f;
            text-align: center;
        }
        .chart-canvas-wrap {
            position: relative;
            height: 280px;
        }

        /* per-chart loading spinner (matches the example's loader idea) */
        .loader-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            z-index: 5;
        }
        .loader-overlay.hidden { display: none; }
        .loader {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #1e3a5f;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
        }
        .loader-text { margin-top: 10px; font-size: 13px; color: #555; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .error-msg { color: #c0392b; font-size: 13px; text-align: center; padding: 20px; }
    </style>
</head>

<body>
    <header>
        <h1>Boat Operations Dashboard</h1>
        <p>PHP + MySQL + Chart.js &mdash; 10 graphs from the boat, boattrip, and driver tables</p>
    </header>

    <div class="charts-grid" id="chartsGrid"></div>

    <script>
        // each chart: api key + chart.js type + optional flags (horizontal bar / radar)
        const CHARTS = [
            { key: 'trips_per_boat',          title: 'Trips per Boat',                 type: 'bar' },
            { key: 'monthly_revenue',         title: 'Total Monthly Revenue',          type: 'line' },
            { key: 'revenue_by_size',         title: 'Revenue by Boat Size',           type: 'bar' },
            { key: 'paid_unpaid',             title: 'Paid vs Unpaid Trips',           type: 'doughnut' },
            { key: 'boat_availability',       title: 'Boat Availability Status',       type: 'pie' },
            { key: 'boat_size_distribution',  title: 'Boat Distribution by Size',      type: 'doughnut' },
            { key: 'top_drivers',             title: 'Top Drivers by Trip Count',      type: 'bar', horizontal: true },
            { key: 'trips_by_status',         title: 'Trips by Status',                type: 'bar' },
            { key: 'avg_speed_by_size',       title: 'Average Speed by Boat Size (knots)', type: 'bar' },
            { key: 'safety_compliance',       title: 'Safety Compliance Rate (%)',     type: 'radar' }
        ];

        const palette = [
            'rgba(54,162,235,0.6)', 'rgba(255,99,132,0.6)', 'rgba(255,205,86,0.6)',
            'rgba(75,192,192,0.6)', 'rgba(153,102,255,0.6)', 'rgba(255,159,64,0.6)',
            'rgba(0,188,212,0.6)',  'rgba(233,30,99,0.6)',   'rgba(139,195,74,0.6)',
            'rgba(121,134,203,0.6)'
        ];
        const border = palette.map(c => c.replace('0.6', '1'));

        const chartInstances = {};

        function buildBoxes() {
            const grid = document.getElementById('chartsGrid');
            CHARTS.forEach(cfg => {
                const box = document.createElement('div');
                box.className = 'chart-box';
                box.innerHTML = `
                    <h3 class="chart-title">${cfg.title}</h3>
                    <div class="chart-canvas-wrap">
                        <canvas id="canvas_${cfg.key}"></canvas>
                        <div class="loader-overlay" id="loader_${cfg.key}">
                            <div class="loader"></div>
                            <div class="loader-text">Loading...</div>
                        </div>
                    </div>`;
                grid.appendChild(box);
            });
        }

        function buildConfig(cfg, payload) {
            const labels = payload.labels || [];
            const values = payload.data || [];
            let datasets, options = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } }
            };

            if (cfg.type === 'pie' || cfg.type === 'doughnut') {
                datasets = [{
                    data: values,
                    backgroundColor: palette.slice(0, labels.length),
                    borderColor: border.slice(0, labels.length),
                    borderWidth: 1
                }];
            } else if (cfg.type === 'radar') {
                datasets = [{
                    label: 'Compliance %',
                    data: values,
                    backgroundColor: 'rgba(54,162,235,0.25)',
                    borderColor: 'rgb(54,162,235)',
                    borderWidth: 2,
                    pointBackgroundColor: 'rgb(54,162,235)'
                }];
                options.scales = { r: { beginAtZero: true, max: 100 } };
            } else if (cfg.type === 'line') {
                datasets = [{
                    label: cfg.title,
                    data: values,
                    borderColor: 'rgb(54,162,235)',
                    backgroundColor: 'rgba(54,162,235,0.15)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4
                }];
                options.scales = { y: { beginAtZero: true } };
            } else { // bar (incl. horizontal)
                datasets = [{
                    label: cfg.title,
                    data: values,
                    backgroundColor: 'rgba(54,162,235,0.6)',
                    borderColor: 'rgb(54,162,235)',
                    borderWidth: 1
                }];
                options.scales = { x: { beginAtZero: true }, y: { beginAtZero: true } };
                if (cfg.horizontal) options.indexAxis = 'y';
            }

            return { type: cfg.type, data: { labels, datasets }, options };
        }

        async function loadChart(cfg) {
            const loader = document.getElementById('loader_' + cfg.key);
            loader.classList.remove('hidden');
            try {
                const res = await fetch('apiData.php?chart=' + cfg.key);
                const payload = await res.json();
                if (payload.error) throw new Error(payload.error);

                if (chartInstances[cfg.key]) chartInstances[cfg.key].destroy();
                const ctx = document.getElementById('canvas_' + cfg.key).getContext('2d');
                chartInstances[cfg.key] = new Chart(ctx, buildConfig(cfg, payload));
                loader.classList.add('hidden');
            } catch (err) {
                console.error('Chart ' + cfg.key + ':', err);
                loader.innerHTML = '<div class="error-msg">Failed to load.<br>' + err.message + '</div>';
            }
        }

        buildBoxes();
        CHARTS.forEach(loadChart); // load every graph (each shows its own loader)
    </script>
</body>

</html>
